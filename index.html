<!-- Экран со всеми карточками -->
<div id="screen-all-cards" class="screen">
  <h2>Все карточки</h2>
  <button onclick="showScreen('screen-select')" style="margin-bottom: 20px;">← Назад к выбору темы</button>

  <!-- Генерация всех карточек -->
  <div id="all-cards-container"></div>
</div>

<script>
function renderAllCards() {
  const container = document.getElementById('all-cards-container');
  container.innerHTML = '';

  for (const [topic, cards] of Object.entries(cardGroups)) {
    if (topic === 'all') continue; // Пропускаем служебную группу

    const topicHeader = document.createElement('h3');
    topicHeader.textContent = topic;
    topicHeader.style.marginTop = '32px';
    topicHeader.style.color = '#5e5ce6';
    container.appendChild(topicHeader);

    cards.forEach(card => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';

      const qEl = document.createElement('div');
      qEl.className = 'question';
      qEl.textContent = card.q;

      const aEl = document.createElement('div');
      aEl.className = 'answer';
      aEl.innerHTML = card.a;
      aEl.style.display = 'block'; // Показываем сразу

      cardEl.appendChild(qEl);
      cardEl.appendChild(aEl);
      container.appendChild(cardEl);
    });
  }

  // Запускаем рендеринг формул после добавления контента
  MathJax.typesetPromise();
}

// Автоматически рендерим при переходе на экран
document.addEventListener('click', (e) => {
  if (e.target.matches('[onclick*="screen-all-cards"]')) {
    setTimeout(renderAllCards, 100);
  }
});
</script>

<script>
  // === КАРТОЧКИ ПО ТЕМАМ ===
  const cardGroups = {

        a: "<strong>Вероятностный эксперимент</strong> - тройка $(\\Omega, \\mathcal{F}, P)$, удовлетворяющая трём аксиомам событий и трём аксиомам вероятности.<br><br>$\\Omega$ - множество исходов<br>$\\mathcal{F}$ - множество событий (сигма-алгебра над множеством исходов)<br>$P$ - вероятность (неотрицательная счетно-аддитивная функция событий)<br><br><strong>Аксиомы событий:</strong><br>1. $\\emptyset\\in\\mathcal{F}$<br>2. $\\forall A,B\\in\\mathcal{F}\\Rightarrow A\\cup B\\in\\mathcal{F}, A\\setminus B\\in\\mathcal{F}, (A\\cap B\\in\\mathcal{F})$<br>3. $\\forall A_{1},A_{2},\\dots\\in\\mathcal{F}\\Rightarrow\\bigcup_{i=1}^{\\infty}A_{i}\\in\\mathcal{F}$<br><br><strong>Аксиомы вероятности:</strong><br>1. $P(\\Omega)=1 (\\forall A \\in \\mathcal{F}:P(A)\\in[0,1])$<br>2. $\\forall A,B \\in \\mathcal{F}:A\\cap B=\\emptyset\\Rightarrow\\mathbb{P}(A\\cup B)=P(A)+P(B)$<br>3. $\\forall A_{1},A_{2}, \\dots\\in \\mathcal{F},\\forall i\\neq j: A_{i}\\cap A_{j}=\\emptyset\\Rightarrow P(\\bigcup_{i=1}^{\\infty}A_{i})=\\sum\\limits_{i=1}^{\\infty}P(A_{i})$"

        a: "<strong>Условная вероятность</strong><br>Условной вероятностью события $A$ при условии $B$ называется $$P(A|B)=\\frac{P(AB)}{P(B)},\\qquad P(B)>0$$"
      },
      {
        q: "6. В каком случае события A1,...,An называются независимыми в совокупности",
        a: "<strong>Независимость в совокупности</strong><br>События $A_{1},\\dots,A_{n}$ независимы в совокупности, если для любого сочетания индексов $1\\leq i_{1} < \\dots < i_{s}\\leq n, s=2,\\dots,n$$$P(A_{i_1}\\dots A_{i_s})=P(A_{i_1})\\dots P(A_{i_s})$$"

      {
        q: "7. Формула полной вероятности",
        a: "<strong>Полная вероятность</strong><br>Пусть $\\{H_{i}\\}_{i=1}^{n}$ - ПГС; $A\\in\\mathcal{F}$ - произвольное событие, тогда: $$P(A)=\\sum\\limits_{i=1}^{n}P(A|H_{i})P(H_{i})$$"

      {
        q: "9. Что такое испытания Бернулли и Формула Бернулли",
        a: "<strong>Испытание</strong> - вер. эксперимент с двумя исходами: успех, неудача<br><br><strong>Испытания Бернулли</strong> - совокупность независимых испытаний с одинаковой вероятностью успеха<br><br>Обозначения<br>- $p=P(\\text{успех})$<br>- $\\mu_{n}$ - число успехов в $n$ испытаниях Бернулли<br>- $\\nu_{k}$ число успехов до $k$-й неудачи (при её наличии)<br><br><strong>Формула Бернулли</strong><br>$$P(\\mu_{n}=k)=C_{n}^{k}\\cdot p^{k}\\cdot (1-p)^{n-k}$$"
      },
      {
        q: "10. Локальная теорема Муавра-Лапласа и как ее применять",
        a: "<strong>Локальная теорема Муавра-Лапласа</strong><br>В схеме Муавра-Лапласа при любом фиксированном $M>0$:$$\\sup_{k:|x_{k}|\\leq M}\\left|\\sqrt{np(1-p)}P_{n}(\\mu_{n}=k)-\\frac{1}{\\sqrt{2\\pi}}\\exp(\\frac{-x_{k}^{2}}{2}) \\right|\\underset{n\\to\\infty}{\\to}0$$<br>- $\\large\\displaystyle x_{k}=\\frac{k-np}{\\sqrt{np(1-p)}}$<br><br>Ну по сути говоря, если мы хотим найти вероятность $k$ успехов, при $n$ испытаниях, нам нужно взять то что после минуса, поделить на $\\sqrt{np(1-p)}$ и мы получим эту вероятность (если конечно серия экспериментов удовлетворяет условиям применения схемы Муавра-Лапласа)"
      },
      {

      }
    ],

      },
      {
        q: "14. Что называется функцией распределения случайной величины, выписать четыре свойства функции распределения",

  // Глобальные переменные
  let currentCards = [];
  let currentIndex = 0;
  let correctCount = 0;

  // Перемешивание
  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  // Сохраняем прогресс
  function saveProgress() {
    const data = {
      cards: currentCards,
      index: currentIndex,
      correct: correctCount
    };
    localStorage.setItem('prob-cards-session', JSON.stringify(data));
  }

  // Загружаем прогресс
  function loadProgress() {
    const saved = localStorage.getItem('prob-cards-session');
    if (!saved) return false;

    try {
      const data = JSON.parse(saved);
      currentCards = data.cards;
      currentIndex = data.index;
      correctCount = data.correct;

      if (currentCards.length > 0 && currentIndex < currentCards.length) {
        showScreen('screen-card');
        updateProgress();
        showCard();
        return true;
      }
    } catch (e) {
      console.warn("Не удалось загрузить прогресс", e);
    }
    return false;
  }

  function startSession(topicKey) {
    const rawCards = cardGroups[topicKey] || [];
    if (rawCards.length === 0) return;

    // Новая сессия — сбрасываем сохранённую
    currentCards = shuffle(rawCards);
    currentIndex = 0;
    correctCount = 0;
    saveProgress();

    showScreen('screen-card');
    updateProgress();
    showCard();
  }

  function updateProgress() {
    const total = currentCards.length;
    const current = currentIndex + 1; // человек считает с 1
    document.getElementById('progress').textContent = `Вопрос ${current} из ${total}`;
  }

  function showCard() {
    if (currentIndex >= currentCards.length) {
      showSummary();
      return;
    }

    const card = currentCards[currentIndex];
    document.getElementById('question').textContent = card.q;
    document.getElementById('answer').innerHTML = '';
    document.getElementById('answer').style.display = 'none';

    MathJax.typesetClear();
    MathJax.typeset();
  }

  function toggleAnswer() {
    const answerEl = document.getElementById('answer');
    const card = currentCards[currentIndex];
    if (answerEl.style.display === 'none') {
      answerEl.innerHTML = card.a;
      answerEl.style.display = 'block';
      MathJax.typeset();
    } else {
      answerEl.style.display = 'none';
    }
  }

 function handleResponse(isCorrect) {
    if (isCorrect) {
      correctCount++;

      // Находим карточку
      const cardEl = document.querySelector('.card');
      if (cardEl) {
        const cardRect = cardEl.getBoundingClientRect();

        // Создаём сообщение
        const message = document.createElement('div');
        message.textContent = "Дальше меньше, братишка. Только назад!";
        message.style.cssText = `
          position: fixed;
          left: ${cardRect.left + cardRect.width / 2}px;
          top: ${cardRect.top - 20 }px;
          transform: translateX(-50%);
          background: #34c759;
          color: white;
          padding: 8px 16px;
          border-radius: 8px;
          font-weight: bold;
          font-size: 14px;
          z-index: 1000;
          opacity: 0;
          animation: fadeInOut 3s forwards;
          white-space: nowrap;
          pointer-events: none;
        `;
        document.body.appendChild(message);
        setTimeout(() => {
          if (message.parentNode) message.parentNode.removeChild(message);
        }, 2000);
      }
    } else {
      // Анимация пуляющей какашки при неправильном ответе
      const poop = document.createElement('div');
      poop.className = 'poop';
      poop.innerHTML = '💩';
      const cardRect = document.querySelector('.card').getBoundingClientRect();
      const x = cardRect.left + cardRect.width / 2;
      const y = cardRect.top + cardRect.height / 2;
      poop.style.left = `${x}px`;
      poop.style.top = `${y}px`;
      document.body.appendChild(poop);
      setTimeout(() => poop.remove(), 1200);
    }

    currentIndex++;
    saveProgress();

    if (currentIndex < currentCards.length) {
      updateProgress();
      showCard();
    } else {
      showSummary();
    }
  }

  function showSummary() {
    const total = currentCards.length;
    const percent = Math.round((correctCount / total) * 100);
    document.getElementById('summary-text').innerHTML = `
      🎯 Ты решил правильно: <strong>${correctCount} из ${total}</strong><br>
      Это <strong>${percent}%</strong>!
    `;
    showScreen('screen-summary');
    // Очистим прогресс после завершения
    localStorage.removeItem('prob-cards-session');
  }

  function resetSession() {
    localStorage.removeItem('prob-cards-session');
    currentCards = [];
    currentIndex = 0;
    correctCount = 0;
    showScreen('screen-select');
  }

  // === При загрузке страницы ===
  window.onload = () => {
    // Пытаемся восстановить сессию
    if (!loadProgress()) {
      // Если нет — показываем выбор темы
      showScreen('screen-select');
    }
  };
</script>
