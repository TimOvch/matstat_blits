<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Математическая статистика — Карточки</title>

  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      max-width: 800px;
      margin: 0 auto;
      background: #f9f9f9;
      color: #333;
    }
    .screen { display: none; }
    .active { display: block; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .question { font-size: 1.2em; margin-bottom: 16px; }
    .progress {
      color: #666;
      font-size: 0.95em;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .answer {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px dashed #ddd;
      color: #0066cc;
      text-align: left;
    }
    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 12px 20px;
      margin: 6px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
    }
    button.correct { background: #34c759; }
    button.incorrect { background: #ff3b30; }
    .topic-btn { background: #5e5ce6; }
    .summary { font-size: 1.2em; margin: 20px 0; }
    .poop {
      position: fixed;
      font-size: 2em;
      z-index: 1000;
      pointer-events: none;
      animation: poopFly 5s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }
    @keyframes poopFly {
      0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      50%  { transform: translate(100px, -150px) rotate(360deg); }
      100% { transform: translate(200px, -300px) rotate(720deg); opacity: 0; }
    }
    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateX(-50%) translateY(20px); }
      20%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      80%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }
  </style>
</head>
<body>

<!-- Экран выбора темы -->
<div id="screen-select" class="screen active">
  <h2>Выбери тему</h2>
  <button class="topic-btn" onclick="startSession('all')">Все карточки</button>
  <button class="topic-btn" onclick="startSession('Точечное оценивание')">Точечное оценивание</button>
  <button class="topic-btn" onclick="startSession('Доверительное оценивание')">Доверительное оценивание</button>
  <button class="topic-btn" onclick="startSession('Проверка гипотез')">Проверка гипотез</button>
  <button class="topic-btn" onclick="startSession('Линейная регрессия')">Линейная регрессия</button>
  <button class="topic-btn" onclick="startSession('Дисперсионный анализ (ANOVA)')">Дисперсионный анализ (ANOVA)</button>
  <button class="topic-btn" onclick="showScreen('screen-all-cards')">Просмотреть все карточки</button>
</div>

<!-- Экран карточки -->
<div id="screen-card" class="screen">
  <button onclick="resetSession()" style="float:right; background:#ff9500; font-size:0.9em; padding:6px 12px;">🔄 Начать заново</button>
  <div class="card">
    <div class="progress" id="progress">Вопрос 1 из 5</div>
    <div class="question" id="question">...</div>
    <div class="answer" id="answer"></div>
    <button onclick="toggleAnswer()">Показать ответ</button>
  </div>
  <button class="correct" onclick="handleResponse(true)">Правильно ✅</button>
  <button class="incorrect" onclick="handleResponse(false)">Неправильно ❌</button>
</div>

<!-- Экран результата -->
<div id="screen-summary" class="screen">
  <div class="summary" id="summary-text"></div>
  <button onclick="showScreen('screen-select')">Вернуться к выбору</button>
</div>

<!-- Экран со всеми карточками -->
<div id="screen-all-cards" class="screen">
  <h2>Все карточки</h2>
  <button onclick="showScreen('screen-select')" style="margin-bottom: 20px;">← Назад к выбору темы</button>
  <div id="all-cards-container"></div>
</div>

<script>
function renderAllCards() {
  const container = document.getElementById('all-cards-container');
  container.innerHTML = '';
  for (const [topic, cards] of Object.entries(cardGroups)) {
    if (topic === 'all') continue;
    const topicHeader = document.createElement('h3');
    topicHeader.textContent = topic;
    topicHeader.style.marginTop = '32px';
    topicHeader.style.color = '#5e5ce6';
    container.appendChild(topicHeader);
    cards.forEach(card => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      const qEl = document.createElement('div');
      qEl.className = 'question';
      qEl.textContent = card.q;
      const aEl = document.createElement('div');
      aEl.className = 'answer';
      aEl.innerHTML = card.a;
      aEl.style.display = 'block';
      cardEl.appendChild(qEl);
      cardEl.appendChild(aEl);
      container.appendChild(cardEl);
    });
  }
  MathJax.typesetPromise();
}
document.addEventListener('click', (e) => {
  if (e.target.matches('[onclick*="screen-all-cards"]')) {
    setTimeout(renderAllCards, 100);
  }
});
</script>

<script>

        a: "<strong>TL;DR:</strong> $F_n(x) = \\frac{1}{n}\\sum 1\\{X_i &lt; x\\}$ — несмещённая оценка $F$; равномерно сходится к $F$ п.н.; $\\sqrt{n}D_n \\Rightarrow K$.<br><br><strong>Формально:</strong><br><strong>Эмпирическая ФР:</strong> $$F_n(x) = \\frac{1}{n}\\sum_{i=1}^n 1\\{X_i &lt; x\\},$$ где $1_A = 1$, если $A$ выполнено, и $0$ иначе.<br><strong>Теорема (Гливенко–Кантелли).</strong> Пусть $X_1, \\ldots, X_n$ — выборка из распределения $P_\\theta$; $F(x)$ и $F_n(x)$ — теоретическая и эмпирическая ФР. Тогда с вероятностью 1 $$\\lim_{n\\to\\infty} D_n(X) = \\lim_{n\\to\\infty} \\sup_{x} |F_n(x) - F(x)| \\to 0.$$<strong>Теорема (Колмогоров).</strong> Если $F(x)$ непрерывна, то для любого $t &gt; 0$ $$\\lim_{n\\to\\infty} \\mathbb{P}(\\sqrt{n} D_n \\leq t) = K(t) = \\sum_{j=-\\infty}^{\\infty} (-1)^j e^{-2j^2 t^2}.$$ Функция $K(t)$ — <em>функция распределения Колмогорова</em>. Статистика $D_n = \\sup_x|F_n(x)-F(x)|$ — <em>статистика Колмогорова</em>."

      },
      {

        a: "<strong>TL;DR:</strong> Гистограмма: $H(x) = \\nu_j/(nh)$ на интервале $I_j$; оптимальный шаг $h_\\text{opt} \\sim n^{-1/3}$. Ядерная оценка сглаживает горбиком $K$.<br><br><strong>Формально:</strong><br><strong>Гистограмма (абсолютно непрерывный случай).</strong> Прямую разбивают на интервалы $\\{I_j\\}$ длины $h &gt; 0$; $\\nu_j$ — число наблюдений в $j$-м интервале. Функция $$H(x) = \\frac{\\nu_j}{nh},\\quad x\\in I_j$$ называется <em>гистограммой</em>. Площадь под $H$ равна 1.<br>Граница среднеквадратичной ошибки: $$E_F(H(x;h) - p(x))^2 \\leq d^2 h^2 + \\frac{p_{\\max}}{nh} + \\frac{p_{\\max}^2}{n},$$ откуда $h_\\text{opt} = (p_{\\max}/(nd^2))^{1/3}$.<br><strong>Ядерная оценка плотности:</strong> $$f_n(x) = (nh_n)^{-1}\\sum_{i=1}^n K\\!\\left(\\frac{x - X_i}{h_n}\\right),$$ где $K$ — неотрицательная функция ограниченной вариации (ядро), обычно симметричная."
      },
      {
        q: "4. Распределения χ², Стьюдента, Фишера–Снедекора. Лемма Фишера",
        a: "<strong>TL;DR:</strong> $\\chi^2_n = \\sum\\xi_i^2$; $S_n = \\xi_0/\\sqrt{\\chi^2_n/n}$; $F_{n,m} = (\\chi^2_n/n)/(\\chi^2_m/m)$. Лемма Фишера: $\\bar X$ и $s^2$ независимы, $ns^2/\\sigma^2 \\sim \\chi^2_{n-1}$.<br><br><strong>Формально:</strong><br>Пусть $\\xi_0, \\xi_1, \\ldots, \\xi_n \\sim \\mathcal{N}(0,1)$ независимы. Тогда:<br>— $\\chi_n^2 = \\sum_{i=1}^n \\xi_i^2$ — <em>хи-квадрат с $n$ степенями свободы</em>;<br>— $S_n = \\xi_0/\\sqrt{\\chi_n^2/n}$ — <em>распределение Стьюдента с $n$ ст.св.</em>;<br>— $F_{n,m} = (\\chi_n^2/n)/(\\chi_m^2/m)$ — <em>распределение Фишера–Снедекора</em>.<br><strong>Теорема (Лемма Фишера).</strong> Пусть $X_1, \\ldots, X_n$ — выборка из $\\mathcal{N}(a,\\sigma^2)$. Тогда:<br>$(i)$ $\\sqrt{n}(\\bar X - a)/\\sigma \\in \\mathcal{N}(0,1)$;<br>$(ii)$ $\\bar X$ и $s^2$ — независимые статистики;<br>$(iii)$ $ns^2/\\sigma^2 \\sim \\chi^2_{n-1}$;<br>$(iv)$ $\\sqrt{n-1}(\\bar X - a)/s \\sim S_{n-1}$."
      },
      {

        a: "<strong>TL;DR:</strong> $L(x;\\theta) = p_\\theta(x)$ — функция от $\\theta$ при фиксированном $x$; ОМП = максимум $L$; ОМП инвариантна.<br><br><strong>Формально:</strong><br><strong>Функция правдоподобия</strong> $L : \\mathfrak{X}\\times\\Theta\\to\\mathbb{R}_+$: $$L(x;\\theta) = p_\\theta(x),\\quad x\\in\\mathfrak{X},\\ \\theta\\in\\Theta.$$ Для выборки $X_1,\\ldots,X_n$: $L(X;\\theta) = \\prod_{i=1}^n p_\\theta(X_i)$; лог-правдоподобие: $LL(X;\\theta) = \\sum_{i=1}^n \\log p_\\theta(X_i)$.<br><strong>Определение.</strong> Оценка $\\hat\\theta(X)$, максимизирующая $L(X;\\theta)$ по $\\theta$, называется <em>оценкой максимального правдоподобия (ОМП)</em>. ОМП находится из уравнения правдоподобия: $$U(X;\\theta) = \\frac{\\partial}{\\partial\\theta}\\log L(X;\\theta) = 0.$$ <strong>Свойство инвариантности:</strong> если $\\hat\\theta$ — ОМП параметра $\\theta$, то $g(\\hat\\theta)$ — ОМП для $g(\\theta)$."

        a: "<strong>TL;DR:</strong> Регулярность — (i)(ii)(iii). $I(\\theta) = E_\\theta U^2 = -E_\\theta \\partial^2_\\theta \\log L$. Для несмещённой оценки $D_\\theta\\delta \\geq 1/I(\\theta)$.<br><br><strong>Формально:</strong><br><strong>Определение.</strong> Эксперимент <em>регулярный</em>, если при каждом $\\theta\\in\\Theta$: $(i)$ $L(x;\\theta)$ непрерывна и непрерывно дифференцируема по $\\theta$; $(ii)$ $\\int_\\mathfrak{X} \\frac{\\partial}{\\partial\\theta}p_\\theta(x)\\,d\\mu = 0$ (дифф. под интегралом); $(iii)$ $0 &lt; I(\\theta) = E_\\theta(U(X;\\theta))^2 &lt; \\infty$, где $U(x;\\theta) = \\frac{\\partial}{\\partial\\theta}\\log L(x;\\theta)$ — <em>скоринговая функция</em>; $I(\\theta)$ — <em>информация Фишера</em>.<br>Аддитивность: для выборки $I_n(\\theta) = nI_1(\\theta)$.<br><strong>Теорема (Неравенство Рао–Крамера).</strong> Пусть эксперимент регулярен, $\\delta$ — разрешённая оценка. Тогда $$D_\\theta\\delta \\geq \\frac{(1+b'(\\theta))^2}{I(\\theta)},$$ где $b(\\theta) = E_\\theta\\delta - \\theta$ — смещение. Для несмещённой: $D_\\theta\\delta \\geq 1/I(\\theta)$."
      },

        a: "<strong>TL;DR:</strong> В условиях регулярности и состоятельности ОМП: $\\sqrt{n}(\\hat\\theta - \\theta) \\Rightarrow \\mathcal{N}(0, I(\\theta)^{-1})$ — ОМП асимптотически эффективна.<br><br><strong>Формально:</strong><br><strong>Теорема (Асимптотическая нормальность ОМП).</strong> Пусть $X = (X_1, \\ldots, X_n)$ — выборка из регулярного семейства; $(i)$ выполнено условие двукратной дифференцируемости плотности под знаком интеграла; $(ii)$ $\\mathbb{I}(\\theta) = nI(\\theta)$ — информационная матрица; $(iii)$ ОМП $\\hat\\theta$ состоятельна. Тогда $$n^{1/2}(\\hat\\theta - \\theta) \\Rightarrow \\mathcal{N}(0, I(\\theta)^{-1}).$$ В условиях теоремы ОМП является <em>асимптотически эффективной</em> (предельная дисперсия достигает нижней границы Рао–Крамера).<br><em>Идея:</em> ЦПТ для скоринга $n^{-1/2}U(X;\\theta) \\Rightarrow \\mathcal{N}(0, I(\\theta))$ + разложение Тейлора $U(\\hat\\theta) = 0$: $n^{1/2}(\\hat\\theta-\\theta) \\approx I^{-1}\\cdot n^{-1/2}U$."

        a: "<strong>TL;DR:</strong> ДИ — статистика $[T_1, T_2]$ накрывающая $\\theta$ с вероятностью $\\geq 1-\\alpha$; строится через генератор $G(X,\\theta)$ с распределением, не зависящим от $\\theta$.<br><br><strong>Формально:</strong><br><strong>Определение.</strong> Статистика $\\hat\\Theta : \\mathfrak{X}\\to\\mathbb{R}^2$ такая, что $$P_\\theta(\\theta\\in[T_1(X), T_2(X)]) \\geq 1 - \\alpha\\quad \\text{при любом}\\quad\\theta\\in\\Theta,$$ называется <em>доверительным интервалом</em> параметра $\\theta$ уровня доверия $1-\\alpha$.<br><strong>Метод генератора.</strong> Пусть $G(X,\\theta)$ — функция параметра и наблюдений, такая что: (1) распределение $G(X,\\theta)$ не зависит от $\\theta$; (2) $\\exists I_\\alpha : P_\\theta(G(X,\\theta)\\in I_\\alpha) \\geq 1-\\alpha$ и $\\hat\\Theta = \\{\\theta : G(X,\\theta)\\in I_\\alpha\\}$ — интервал. Тогда $\\hat\\Theta$ — ДИ уровня $1-\\alpha$. Функция $G(X,\\theta)$ называется <em>генератором</em> доверительного интервала."

  // Автоматически создаём группу "all"
  cardGroups.all = Object.keys(cardGroups)

  // Глобальные переменные
  let currentCards = [];
  let currentIndex = 0;
  let correctCount = 0;

  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  function saveProgress() {
    const data = { cards: currentCards, index: currentIndex, correct: correctCount };
    localStorage.setItem('stat-cards-session', JSON.stringify(data));
  }

  function loadProgress() {
    const saved = localStorage.getItem('stat-cards-session');
    if (!saved) return false;
    try {
      const data = JSON.parse(saved);
      currentCards = data.cards;
      currentIndex = data.index;
      correctCount = data.correct;
      if (currentCards.length > 0 && currentIndex < currentCards.length) {
        showScreen('screen-card');
        updateProgress();
        showCard();
        return true;
      }
    } catch (e) {
      console.warn("Не удалось загрузить прогресс", e);
    }
    return false;
  }

  function startSession(topicKey) {
    const rawCards = cardGroups[topicKey] || [];
    if (rawCards.length === 0) return;
    currentCards = shuffle(rawCards);
    currentIndex = 0;
    correctCount = 0;
    saveProgress();
    showScreen('screen-card');
    updateProgress();
    showCard();
  }

  function updateProgress() {
    const total = currentCards.length;
    const current = currentIndex + 1;
    document.getElementById('progress').textContent = `Вопрос ${current} из ${total}`;
  }

  function showCard() {
    if (currentIndex >= currentCards.length) {
      showSummary();
      return;
    }
    const card = currentCards[currentIndex];
    document.getElementById('question').textContent = card.q;
    document.getElementById('answer').innerHTML = '';
    document.getElementById('answer').style.display = 'none';
    MathJax.typesetClear();
    MathJax.typeset();
  }

  function toggleAnswer() {
    const answerEl = document.getElementById('answer');

    if (answerEl.style.display === 'none') {

        message.style.cssText = `
          position: fixed;
          left: ${cardRect.left + cardRect.width / 2}px;
          top: ${cardRect.top - 20}px;
          transform: translateX(-50%);
          background: #34c759;
          color: white;
          padding: 8px 16px;
          border-radius: 8px;
          font-weight: bold;
          font-size: 14px;
          z-index: 1000;
          opacity: 0;
          animation: fadeInOut 3s forwards;
          white-space: nowrap;
          pointer-events: none;
        `;
        document.body.appendChild(message);
        setTimeout(() => { if (message.parentNode) message.parentNode.removeChild(message); }, 2000);
      }
    } else {
      const poop = document.createElement('div');
      poop.className = 'poop';
      poop.innerHTML = '💩';
      const cardRect = document.querySelector('.card').getBoundingClientRect();
      poop.style.left = `${cardRect.left + cardRect.width / 2}px`;
      poop.style.top  = `${cardRect.top  + cardRect.height / 2}px`;
      document.body.appendChild(poop);
      setTimeout(() => poop.remove(), 1200);
    }

    currentIndex++;
    saveProgress();

    if (currentIndex < currentCards.length) {
      updateProgress();
      showCard();
    } else {
      showSummary();
    }
  }

  function showSummary() {
    const total = currentCards.length;
    const percent = Math.round((correctCount / total) * 100);
    document.getElementById('summary-text').innerHTML = `
      🎯 Ты решил правильно: <strong>${correctCount} из ${total}</strong><br>
      Это <strong>${percent}%</strong>!
    `;
    showScreen('screen-summary');
    localStorage.removeItem('stat-cards-session');
  }

  function resetSession() {
    localStorage.removeItem('stat-cards-session');
    currentCards = [];
    currentIndex = 0;
    correctCount = 0;
    showScreen('screen-select');
  }

  window.onload = () => {
    if (!loadProgress()) {
      showScreen('screen-select');
    }
  };
</script>

</body>
</html>
